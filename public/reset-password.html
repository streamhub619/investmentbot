<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - InvestmentBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="login-screen" style="display:flex">
    <div class="login-box">
      <div class="login-title">RESET PASSWORD</div>
      <div class="login-sub">Enter your new password</div>

      <div class="field">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="••••••"/>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="••••••"/>
      </div>

      <button class="btn" onclick="resetPassword()">RESET PASSWORD</button>
      <div id="reset-message" style="margin-top:10px; font-size:11px;"></div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000';

    async function resetPassword() {
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const msgEl = document.getElementById('reset-message');

      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) { msgEl.style.color = 'var(--danger)'; msgEl.textContent = 'Invalid reset link.'; return; }
      if (newPassword !== confirmPassword) { msgEl.style.color = 'var(--danger)'; msgEl.textContent = 'Passwords do not match.'; return; }
      if (newPassword.length < 6) { msgEl.style.color = 'var(--danger)'; msgEl.textContent = 'Password must be at least 6 characters.'; return; }

      try {
        const res = await fetch(API + '/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();

        if (!res.ok) {
          msgEl.style.color = 'var(--danger)';
          msgEl.textContent = data.error || 'Something went wrong.';
          return;
        }

        msgEl.style.color = 'var(--accent)';
        msgEl.textContent = data.message + ' Redirecting to login...';
        setTimeout(() => window.location.href = '/', 2000);
      } catch (e) {
        msgEl.style.color = 'var(--danger)';
        msgEl.textContent = 'Could not connect to server.';
      }
    }
  </script>
</body>
</html>
